global:
  scrape_interval: 15s

scrape_configs:
  - job_name: "course-service"
    static_configs:
      - targets: ["course-service:8000"]
  - job_name: "student-service"
    static_configs:
      - targets: ["student-service:8001"]
  - job_name: "enrollment-service"
    static_configs:
      - targets: ["enrollment-service:8002"]
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
